version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8888:8888"
    env_file:
      - ../backend/.env
    volumes:
      - ../backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file:
      - ../frontend/.env.local
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend
